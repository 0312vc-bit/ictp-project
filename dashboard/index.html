<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICTP DevSecOps Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <header class="glass-panel main-header">
            <div class="logo">
                <i class="fa-solid fa-shield-halved fa-bounce" style="--fa-animation-iteration-count: 2;"></i>
                <h1>ICTP Pipeline Status</h1>
            </div>
            <div class="status-indicator">
                <span class="pulse"></span>
                <span id="pipelineState">Pipeline Syncing...</span>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Test Metrics -->
            <section class="glass-panel card stats-card tests-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-vial-circle-check"></i> Test Automation</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-item total">
                        <span class="label">Total Tests</span>
                        <span class="value" id="totalTests">--</span>
                    </div>
                    <div class="stat-item passed">
                        <span class="label">Passed</span>
                        <span class="value" id="passedTests">--</span>
                    </div>
                    <div class="stat-item failed">
                        <span class="label">Failed</span>
                        <span class="value" id="failedTests">--</span>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="testProgressBar"></div>
                </div>
            </section>

            <!-- Security Metrics -->
            <section class="glass-panel card stats-card security-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-user-secret"></i> Security Scan (ZAP)</h2>
                </div>
                <div class="stats-grid security-stats">
                    <div class="stat-item warning">
                        <span class="label">Vulnerabilities</span>
                        <span class="value" id="securityAlerts">--</span>
                    </div>
                    <div class="stat-item success">
                        <span class="label">Critical Issues</span>
                        <span class="value">0</span>
                    </div>
                </div>
                <div class="security-status" id="securityStatus">
                    Scanning...
                </div>
            </section>

            <!-- Detailed Test Results -->
            <section class="glass-panel card detailed-card full-width">
                <div class="card-header">
                    <h2><i class="fa-solid fa-list-check"></i> Execution Logs</h2>
                </div>
                <div class="table-container">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Test Case</th>
                                <th>Description</th>
                                <th>Duration (ms)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="testResultsBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
